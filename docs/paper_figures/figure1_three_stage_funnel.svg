<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Three-stage evaluation funnel</title>
  <desc id="desc">All validated cases pass through bare Flash, then bare Pro on failures, then Flash plus harness on double failures.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}
      .decision{fill:#eef6ff;stroke:#2563eb;stroke-width:2}
      .pass{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}
      .fail{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:10}
      .label{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#0f172a}
      .small{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#475569}
      .edge{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="box" x="35" y="132" width="160" height="72"/>
  <text class="label" x="115" y="160" text-anchor="middle">All validated</text>
  <text class="label" x="115" y="183" text-anchor="middle">cases (N)</text>

  <polygon class="decision" points="305,108 405,168 305,228 205,168"/>
  <text class="label" x="305" y="160" text-anchor="middle">Stage 1</text>
  <text class="small" x="305" y="182" text-anchor="middle">bare Flash</text>

  <rect class="pass" x="235" y="270" width="140" height="56"/>
  <text class="label" x="305" y="294" text-anchor="middle">Solved by</text>
  <text class="label" x="305" y="316" text-anchor="middle">weak model</text>

  <polygon class="decision" points="530,108 630,168 530,228 430,168"/>
  <text class="label" x="530" y="160" text-anchor="middle">Stage 2</text>
  <text class="small" x="530" y="182" text-anchor="middle">bare Pro</text>

  <rect class="pass" x="460" y="270" width="140" height="56"/>
  <text class="label" x="530" y="294" text-anchor="middle">Needed</text>
  <text class="label" x="530" y="316" text-anchor="middle">stronger model</text>

  <polygon class="decision" points="760,108 875,168 760,228 645,168"/>
  <text class="label" x="760" y="158" text-anchor="middle">Stage 3</text>
  <text class="small" x="760" y="181" text-anchor="middle">Flash + harness</text>

  <rect class="pass" x="692" y="270" width="136" height="56"/>
  <text class="label" x="760" y="294" text-anchor="middle">Harness</text>
  <text class="label" x="760" y="316" text-anchor="middle">lift</text>

  <rect class="fail" x="940" y="132" width="145" height="72"/>
  <text class="label" x="1012" y="160" text-anchor="middle">Residual</text>
  <text class="small" x="1012" y="183" text-anchor="middle">mostly gold/QC</text>

  <path class="edge" d="M195,168 L206,168"/>
  <path class="edge" d="M405,168 L431,168"/>
  <path class="edge" d="M630,168 L646,168"/>
  <path class="edge" d="M875,168 L940,168"/>
  <path class="edge" d="M305,228 L305,270"/>
  <path class="edge" d="M530,228 L530,270"/>
  <path class="edge" d="M760,228 L760,270"/>
  <text class="small" x="306" y="252" text-anchor="middle">pass</text>
  <text class="small" x="530" y="252" text-anchor="middle">pass</text>
  <text class="small" x="760" y="252" text-anchor="middle">pass</text>
  <text class="small" x="418" y="150" text-anchor="middle">fail</text>
  <text class="small" x="638" y="150" text-anchor="middle">fail</text>
  <text class="small" x="908" y="150" text-anchor="middle">fail</text>
</svg>
