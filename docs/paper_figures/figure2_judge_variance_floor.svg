<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">LLM judge variance floor</title>
  <desc id="desc">Single-vote temperature-zero judging has a five-case spread and majority-of-three judging reduces the spread to two cases.</desc>
  <defs>
    <style>
      .axis{stroke:#334155;stroke-width:2}
      .grid{stroke:#cbd5e1;stroke-width:1}
      .bar1{fill:#fb923c}
      .bar2{fill:#10b981}
      .bar3{fill:#94a3b8}
      .label{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#0f172a}
      .small{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#475569}
      .value{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:700;fill:#0f172a}
    </style>
  </defs>
  <text class="label" x="460" y="34" text-anchor="middle">Judge variance floor across repeated identical runs</text>
  <text class="small" x="460" y="56" text-anchor="middle">Metric: spread in pass counts across runs; lower is better</text>

  <line class="axis" x1="110" y1="340" x2="835" y2="340"/>
  <line class="axis" x1="110" y1="90" x2="110" y2="340"/>
  <line class="grid" x1="110" y1="295" x2="835" y2="295"/>
  <line class="grid" x1="110" y1="250" x2="835" y2="250"/>
  <line class="grid" x1="110" y1="205" x2="835" y2="205"/>
  <line class="grid" x1="110" y1="160" x2="835" y2="160"/>
  <line class="grid" x1="110" y1="115" x2="835" y2="115"/>

  <text class="small" x="95" y="344" text-anchor="end">0</text>
  <text class="small" x="95" y="299" text-anchor="end">2</text>
  <text class="small" x="95" y="254" text-anchor="end">4</text>
  <text class="small" x="95" y="209" text-anchor="end">6</text>
  <text class="small" x="95" y="164" text-anchor="end">8</text>
  <text class="small" x="95" y="119" text-anchor="end">10</text>

  <rect class="bar1" x="180" y="227.5" width="130" height="112.5" rx="4"/>
  <text class="value" x="245" y="217" text-anchor="middle">5</text>
  <text class="label" x="245" y="368" text-anchor="middle">single vote</text>
  <text class="small" x="245" y="389" text-anchor="middle">temp 0; 18% flips</text>

  <rect class="bar2" x="395" y="295" width="130" height="45" rx="4"/>
  <text class="value" x="460" y="285" text-anchor="middle">2</text>
  <text class="label" x="460" y="368" text-anchor="middle">majority of 3</text>
  <text class="small" x="460" y="389" text-anchor="middle">temp 0; 9% flips</text>

  <rect class="bar3" x="610" y="92.5" width="130" height="247.5" rx="4"/>
  <text class="value" x="675" y="82" text-anchor="middle">11</text>
  <text class="label" x="675" y="368" text-anchor="middle">single vote</text>
  <text class="small" x="675" y="389" text-anchor="middle">temp 0.4; 27% flips</text>

  <text class="small" transform="translate(32,215) rotate(-90)" text-anchor="middle">pass-count spread, cases</text>
</svg>
